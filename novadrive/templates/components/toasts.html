{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="pointer-events-none fixed right-4 top-4 z-[80] flex w-full max-w-sm flex-col gap-3">
      {% for category, message in messages %}
        <div data-toast class="pointer-events-auto rounded-2xl border px-4 py-3 shadow-2xl backdrop-blur-xl {% if category == 'success' %}border-emerald-400/30 bg-emerald-500/15 text-emerald-100{% elif category == 'error' %}border-rose-400/30 bg-rose-500/15 text-rose-100{% elif category == 'warning' %}border-amber-400/30 bg-amber-500/15 text-amber-100{% else %}border-fuchsia-400/30 bg-fuchsia-500/15 text-fuchsia-100{% endif %}">
          <div class="flex items-start justify-between gap-3">
            <div>
              <p class="text-sm font-semibold">{{ category|title }}</p>
              <p class="mt-1 text-sm leading-6">{{ message }}</p>
            </div>
            <button type="button" class="text-sm text-white/60 transition hover:text-white" data-dismiss-toast>&times;</button>
          </div>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
