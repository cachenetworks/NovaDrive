<div id="confirm-modal" class="pointer-events-none fixed inset-0 z-[90] hidden items-center justify-center px-4">
  <div class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
  <div class="relative w-full max-w-md rounded-[28px] border border-white/10 bg-nova-900/95 p-6 shadow-[0_30px_120px_rgba(0,0,0,0.55)]">
    <p class="text-xs uppercase tracking-[0.28em] text-fuchsia-200/70">Confirm Action</p>
    <h3 id="confirm-modal-title" class="mt-3 text-2xl font-semibold text-white">Are you sure?</h3>
    <p id="confirm-modal-body" class="mt-3 text-sm leading-7 text-slate-400">This action cannot be undone.</p>
    <div class="mt-6 flex items-center justify-end gap-3">
      <button type="button" class="rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-sm text-slate-200 transition hover:bg-white/10" data-confirm-cancel>Cancel</button>
      <button type="button" class="rounded-2xl border border-rose-400/20 bg-rose-500/15 px-4 py-2 text-sm font-medium text-rose-100 transition hover:bg-rose-500/25" id="confirm-modal-submit">Confirm</button>
    </div>
  </div>
</div>
